<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center">
    <div class="grid grid-cols-2 text-center m-7 box-decoration-clone shadow-lg shadow-purple-500/50">
        <div class="border rounded-l-lg pt-12" style="background-color: #d3b6f5c9;">
            <div class="m-10 rounded-sm">
                <h1 class="text-4xl italic font-mono p-2">WELCOME BACK!</h1>
                <p class="italic p-2">Enter your personal details to use all of site features.</p>
                <button class="border border-blue-900 bg-purple-400 m-4 p-2 rounded-md w-40 text-black hover:bg-indigo-600 hover:text-slate-100">SIGN IN</button>
            </div>
        </div>
        <div class="border rounded-r-lg p-10 bg-white">
            <h1 class="text-4xl italic font-mono">Create Account</h1>
                <div class="border-b border-white/10 pb-12">
      <h2 class="text-base/7 font-semibold ">Personal Information</h2>
      <p class="mt-1 text-sm/6 text-gray-400">Use a permanent address where you can receive mail.</p>
      <form action="#" method="get">
        <input type="text" for="name" placeholder="Name" class="w-full rounded-md border-0 bg-white/5 px-3 py-2 text-sm text-black shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600">
        <input type="email" for="email" placeholder="Email" class="w-full rounded-md border-0 bg-white/5 px-3 py-2 text-sm text-black shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 mt-4">
        <input type="password" for="password" placeholder="Password" class="w-full rounded-md border-0 bg-white/5 px-3 py-2 text-sm text-black shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 mt-4">
        <button type="submit" class="bg-indigo-500 m-4 p-2 rounded-md w-40 text-black hover:bg-indigo-600 hover:text-slate-100">CREATE ACCOUNT</button>
      </form>

    

    </div>
</body>
</html>
